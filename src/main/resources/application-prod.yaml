# application-prod.yml — todo viene de variables de entorno
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate   # nunca auto-modifica en prod

server:
  error:
    include-stacktrace: never
    include-message: never

logging:
  level:
    root: WARN
    com.academictracker: INFO