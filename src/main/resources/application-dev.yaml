# application-dev.yml — solo sobreescribe lo que cambia
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/${DB_NAME:academictracker}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update     # auto-migra en dev
    show-sql: true
  devtools:
    restart:
      enabled: true

logging:
  level:
    com.academictracker: DEBUG
    org.hibernate.SQL: DEBUG

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
  api-docs:
    path: /api-docs       # exportar a Postman Collection